###############################################################################
# GPUCompress 4n4g Simulated Cluster
#
# Topology:
#   - gpucompress-head      : MPI head node (launches benchmarks)
#   - gpucompress-worker-1  : MPI worker
#   - gpucompress-worker-2  : MPI worker
#   - gpucompress-worker-3  : MPI worker
#
# 4 nodes x 4 slots = 16 MPI ranks, all sharing 1 physical GPU
###############################################################################

services:
  gpucompress-head:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gpucompress-head
    hostname: gpucompress-head
    command: ["head"]
    environment:
      - NUM_WORKERS=3
      - SLOTS_PER_NODE=4
      - OMP_NUM_THREADS=1
      - OMPI_ALLOW_RUN_AS_ROOT=1
      - OMPI_ALLOW_RUN_AS_ROOT_CONFIRM=1
    volumes:
      - gpucompress-workspace:/workspace
      - /home/cc/GPUCompress:/opt/GPUCompress
      - /home/cc/testDeltaSCripts/vpic-kokkos:/opt/vpic-kokkos:ro
      - /tmp/lib:/tmp/lib:ro
      - /tmp/hdf5-install:/tmp/hdf5-install:ro
      - /tmp/include:/tmp/include:ro
    networks:
      - gpucompress-net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
        limits:
          cpus: "4"
          memory: 8G

  gpucompress-worker-1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gpucompress-worker-1
    hostname: gpucompress-worker-1
    command: ["worker"]
    environment:
      - SLOTS_PER_NODE=4
      - OMP_NUM_THREADS=1
      - OMPI_ALLOW_RUN_AS_ROOT=1
      - OMPI_ALLOW_RUN_AS_ROOT_CONFIRM=1
    volumes:
      - gpucompress-workspace:/workspace
      - /home/cc/GPUCompress:/opt/GPUCompress
      - /home/cc/testDeltaSCripts/vpic-kokkos:/opt/vpic-kokkos:ro
      - /tmp/lib:/tmp/lib:ro
      - /tmp/hdf5-install:/tmp/hdf5-install:ro
      - /tmp/include:/tmp/include:ro
    networks:
      - gpucompress-net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
        limits:
          cpus: "4"
          memory: 8G

  gpucompress-worker-2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gpucompress-worker-2
    hostname: gpucompress-worker-2
    command: ["worker"]
    environment:
      - SLOTS_PER_NODE=4
      - OMP_NUM_THREADS=1
      - OMPI_ALLOW_RUN_AS_ROOT=1
      - OMPI_ALLOW_RUN_AS_ROOT_CONFIRM=1
    volumes:
      - gpucompress-workspace:/workspace
      - /home/cc/GPUCompress:/opt/GPUCompress
      - /home/cc/testDeltaSCripts/vpic-kokkos:/opt/vpic-kokkos:ro
      - /tmp/lib:/tmp/lib:ro
      - /tmp/hdf5-install:/tmp/hdf5-install:ro
      - /tmp/include:/tmp/include:ro
    networks:
      - gpucompress-net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
        limits:
          cpus: "4"
          memory: 8G

  gpucompress-worker-3:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gpucompress-worker-3
    hostname: gpucompress-worker-3
    command: ["worker"]
    environment:
      - SLOTS_PER_NODE=4
      - OMP_NUM_THREADS=1
      - OMPI_ALLOW_RUN_AS_ROOT=1
      - OMPI_ALLOW_RUN_AS_ROOT_CONFIRM=1
    volumes:
      - gpucompress-workspace:/workspace
      - /home/cc/GPUCompress:/opt/GPUCompress
      - /home/cc/testDeltaSCripts/vpic-kokkos:/opt/vpic-kokkos:ro
      - /tmp/lib:/tmp/lib:ro
      - /tmp/hdf5-install:/tmp/hdf5-install:ro
      - /tmp/include:/tmp/include:ro
    networks:
      - gpucompress-net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
        limits:
          cpus: "4"
          memory: 8G

volumes:
  gpucompress-workspace:

networks:
  gpucompress-net:
    driver: bridge
